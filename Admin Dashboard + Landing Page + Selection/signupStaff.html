<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Registration - ASA Lost and Found</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="signupStaff.css">
</head>
<body>

<header>
  <div class="logo-container">
    <img src="Final logo.png" alt="ASA Logo" class="main-logo">
  </div>
  <div class="header-right">
    <a href="selection.html" class="nav-link">Back to Selection</a>
  </div>
</header>

<main class="registration-section">
  <div class="registration-container">
    
    <!-- Green Background Wrapper -->
    <div class="green-frame">
      
      <!-- White Form Card -->
      <div class="form-card">
        <div class="form-header-badge">
          <h2>REGISTRATION FORM</h2>
        </div>

        <form action="#" class="signup-form">
          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" placeholder="Enter first name" required>
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" placeholder="Enter last name" required>
            </div>
          </div>

          <div class="form-group">
            <label>Email (Required: @carsu.edu.ph)</label>
            <input type="email" 
                   placeholder="staff.name@carsu.edu.ph" 
                   pattern=".+@carsu\.edu\.ph" 
                   title="Please use your official CSU staff email address" 
                   required>
          </div>

          <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="" required>
          </div>

          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" placeholder="" required>
          </div>

          <div class="form-group">
            <label>Role</label>
            <input type="text" value="Staff" readonly class="readonly-input">
          </div>
        </form>
      </div>

      <!-- Right Side Content -->
      <div class="promo-content">
        <h1 class="promo-title">SIGN-UP NOW</h1>
        <p class="promo-text">
          Join the ASA Lost and Found Tracking System and help the campus community reconnect with lost items. 
          Every day, users report lost belongings and share found items to help return them to their rightful owners.
        </p>
        <button type="submit" class="register-btn">Register</button>
      </div>

    </div>
  </div>
</main>

<footer class="bottom-bar"></footer>

</body>
</html>
